<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self'; img-src 'self' data: blob: https:; connect-src 'self' http: https:; frame-src *;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibeyard</title>
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="xterm.css">
  <link rel="stylesheet" href="vendor/gridstack.min.css">
</head>
<body>
  <div id="app">
    <div id="sidebar">
      <div id="sidebar-header">
        <button id="btn-toggle-sidebar" class="icon-btn" title="Toggle Sidebar (Cmd+B)">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2.4"/><line x1="9" y1="4" x2="9" y2="20"/></svg>
        </button>
        <div class="sidebar-header-actions">
          <button id="btn-preferences" class="icon-btn" title="Preferences">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
          <button id="btn-add-project" class="icon-btn primary" title="New Project (Ctrl+Shift+P)">
            <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="3.5" x2="8" y2="12.5"/><line x1="3.5" y1="8" x2="12.5" y2="8"/></svg>
          </button>
        </div>
      </div>
      <div id="sidebar-content">
        <div id="project-list"></div>
      </div>
      <div id="sidebar-discussions"></div>
    </div>
    <div id="sidebar-resize-handle"></div>
    <div id="main-area">
      <div id="tab-bar">
        <div id="tab-list"></div>
        <div id="git-status"></div>
        <div id="tab-actions">
          <button id="btn-toggle-terminal" class="icon-btn" title="Toggle Terminal (Ctrl+`)" aria-label="Toggle Terminal"></button>
          <button id="btn-add-browser-tab" class="icon-btn" title="New Browser Tab" aria-label="New Browser Tab">
            <span class="toolbar-icon toolbar-icon-browser" aria-hidden="true"></span>
          </button>
          <button id="btn-more" class="icon-btn" title="More" aria-haspopup="menu" aria-label="More"></button>
          <div class="split-btn-group new-session-group">
            <button id="btn-add-session" class="btn-primary new-session-main" title="New Session (Ctrl+Shift+N)">
              <span class="new-session-icon" aria-hidden="true">+</span>New session
            </button>
            <button id="btn-add-session-menu" class="btn-primary new-session-caret" title="New Custom Session" aria-label="New Custom Session">&#x25BE;</button>
          </div>
        </div>
      </div>
      <div id="terminal-container"></div>
      <div id="project-terminal-resize-handle" class="hidden"></div>
      <div id="project-terminal-panel" class="hidden">
        <div id="project-terminal-header">
          <span class="project-terminal-title">Terminal</span>
          <div class="project-terminal-header-actions">
            <button id="btn-new-terminal" class="icon-btn" title="New Terminal">+</button>
            <button id="btn-close-terminal" class="icon-btn" title="Close Terminal">&times;</button>
          </div>
        </div>
        <div id="project-terminal-body">
          <div id="project-terminal-container"></div>
          <div id="project-terminal-sidebar" class="hidden"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <div id="modal-title"></div>
      <div id="modal-body"></div>
      <div id="modal-actions">
        <button id="modal-cancel" class="btn-secondary">Cancel</button>
        <button id="modal-confirm" class="btn-primary">Create</button>
      </div>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
